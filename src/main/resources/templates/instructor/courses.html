<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Quản lý khóa học - Giảng viên</title>
</head>
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="bg-white border-b border-gray-200 mb-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Khóa học của tôi</h1>
                        <p class="text-gray-500">Quản lý và cập nhật nội dung các khóa học bạn đã tạo.</p>
                    </div>
                    <a href="/create" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Tạo khóa học mới
                    </a>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
            <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-50 border border-red-100 text-red-700 text-sm">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${courses == null || courses.isEmpty()}" class="card p-12 text-center">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300 text-3xl">
                    <i class="fas fa-book-open"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">Bạn chưa tạo khóa học nào</h3>
                <p class="text-gray-500 mb-8">Hãy bắt đầu chia sẻ kiến thức của bạn ngay hôm nay.</p>
                <a href="/create" class="btn btn-primary px-8">Tạo khóa học đầu tiên</a>
            </div>

            <div th:if="${courses != null && !courses.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div th:each="course : ${courses}" class="card group flex flex-col hover:shadow-xl transition-all duration-300 border-none ring-1 ring-gray-200 overflow-hidden">
                    <div class="relative h-48 overflow-hidden bg-gray-100">
                        <img th:src="${course.displayImageUrl}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <div class="absolute top-4 right-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-sm"
                                  th:classappend="${course.isActive} ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'"
                                  th:text="${course.isActive} ? 'Đang hoạt động' : 'Chờ duyệt'">Status</span>
                        </div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-2" th:text="${course.title}">Course Title</h3>
                        <p class="text-sm text-gray-500 mb-6 line-clamp-2 flex-grow" th:text="${course.description}">Description</p>
                        
                        <div class="pt-4 border-t border-gray-100 flex items-center justify-between">
                            <span class="text-lg font-bold text-primary" th:text="${#numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">0 VND</span>
                            <div class="flex gap-2">
                                <a th:href="@{'/instructor/courses/' + ${course.courseId} + '/edit'}" class="btn btn-sm btn-outline" title="Chỉnh sửa nội dung">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{'/instructor/courses/' + ${course.courseId} + '/delete'}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa khóa học này?');">
                                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger" title="Xóa khóa học">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
