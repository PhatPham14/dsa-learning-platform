<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="'Chỉnh sửa ' + ${#strings.capitalize(itemType)}">Chỉnh sửa nội dung - Giảng viên</title>
</head>
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="bg-white border-b border-gray-200 mb-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="flex items-center gap-4">
                    <a th:href="@{'/instructor/courses/' + ${courseId} + '/edit'}" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900" th:text="'Chỉnh sửa ' + ${#strings.capitalize(itemType)}">Chỉnh sửa nội dung</h1>
                        <p class="text-sm text-gray-500">Cập nhật thông tin chi tiết cho bài học hoặc chương này.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
            <div class="card p-8 border-none ring-1 ring-gray-200 shadow-xl">
                <!-- Session Form -->
                <form th:if="${itemType == 'session'}" th:action="@{'/instructor/sessions/' + ${item.sessionId} + '/edit'}" method="post" class="space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="label-field">Tiêu đề chương</label>
                        <input type="text" name="title" class="input-field" th:value="${item.title}" required />
                    </div>
                    <div>
                        <label class="label-field">Mô tả</label>
                        <textarea name="description" class="input-field" rows="4" th:text="${item.description}"></textarea>
                    </div>
                    <div>
                        <label class="label-field">Thứ tự hiển thị</label>
                        <input type="number" name="sessionOrder" class="input-field" th:value="${item.sessionOrder}" required />
                    </div>
                    <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
                        <a th:href="@{'/instructor/courses/' + ${courseId} + '/edit'}" class="btn btn-outline">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-8">Lưu thay đổi</button>
                    </div>
                </form>

                <!-- Video Form -->
                <form th:if="${itemType == 'video'}" th:action="@{'/instructor/videos/' + ${item.videoId} + '/edit'}" method="post" class="space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="label-field">Tiêu đề video</label>
                        <input type="text" name="title" class="input-field" th:value="${item.title}" required />
                    </div>
                    <div>
                        <label class="label-field">URL Video (Embed)</label>
                        <input type="text" name="videoUrl" class="input-field" th:value="${item.videoUrl}" required />
                    </div>
                    <div>
                        <label class="label-field">Thời lượng (phút)</label>
                        <input type="number" name="duration" class="input-field" th:value="${item.duration}" required min="1" />
                    </div>
                    <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
                        <a th:href="@{'/instructor/courses/' + ${courseId} + '/edit'}" class="btn btn-outline">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-8">Lưu thay đổi</button>
                    </div>
                </form>

                <!-- Quiz Form -->
                <form th:if="${itemType == 'quiz'}" th:action="@{'/instructor/quizzes/' + ${item.quizId} + '/edit'}" method="post" class="space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="label-field">Tiêu đề trắc nghiệm</label>
                        <input type="text" name="title" class="input-field" th:value="${item.title}" required />
                    </div>
                    <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
                        <a th:href="@{'/instructor/courses/' + ${courseId} + '/edit'}" class="btn btn-outline">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-8">Lưu thay đổi</button>
                    </div>
                </form>

                <!-- Assignment Form -->
                <form th:if="${itemType == 'assignment'}" th:action="@{'/instructor/assignments/' + ${item.assignmentId} + '/edit'}" method="post" class="space-y-6">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="label-field">Tiêu đề bài tập</label>
                        <input type="text" name="title" class="input-field" th:value="${item.title}" required />
                    </div>
                    <div>
                        <label class="label-field">Mô tả / Yêu cầu</label>
                        <textarea name="description" class="input-field" rows="6" th:text="${item.description}"></textarea>
                    </div>
                    <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
                        <a th:href="@{'/instructor/courses/' + ${courseId} + '/edit'}" class="btn btn-outline">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-8">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
