<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="#{login.title}">Đăng nhập - DSA Platform</title>
</head>
<body>
    <div th:fragment="content" class="min-h-[calc(100vh-64px-300px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
            <div>
                <div class="mx-auto h-12 w-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary text-2xl mb-6">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-center text-3xl font-extrabold text-gray-900" th:text="#{login.title}">Chào mừng trở lại</h2>
                <p class="mt-2 text-center text-sm text-gray-600" th:text="#{login.subtitle}">
                    Vui lòng đăng nhập để tiếp tục học tập
                </p>
            </div>
            
            <form id="login-form" class="mt-8 space-y-6">
                <div id="login-error" class="hidden p-4 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100"></div>
                
                <div class="rounded-md space-y-4">
                    <div class="form-group">
                        <label for="email" class="label-field" th:text="#{login.email}">Email hoặc Số điện thoại</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </div>
                            <input id="email" name="email" type="text" required class="input-field pl-10" th:placeholder="#{login.emailPlaceholder}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div class="flex items-center justify-between mb-1">
                            <label for="password" class="label-field" th:text="#{login.password}">Mật khẩu</label>
                            <a href="#" class="text-xs font-semibold text-primary hover:text-primary-dark">Quên mật khẩu?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-key text-gray-400"></i>
                            </div>
                            <input id="password" name="password" type="password" required class="input-field pl-10" th:placeholder="#{login.passwordPlaceholder}">
                        </div>
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">Ghi nhớ đăng nhập</label>
                </div>

                <div>
                    <button type="submit" id="login-submit" class="btn btn-primary w-full py-3 shadow-lg shadow-primary/20">
                        <span th:text="#{login.signin}">Đăng nhập</span>
                        <i class="fas fa-arrow-right ml-2 text-xs"></i>
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    <span th:text="#{login.noAccount}">Chưa có tài khoản?</span>
                    <a href="/register" class="font-bold text-primary hover:text-primary-dark transition-colors" th:text="#{login.register}">Đăng ký ngay</a>
                </p>
            </div>
        </div>

        <script>
            (function() {
                const form = document.getElementById('login-form');
                const submitBtn = document.getElementById('login-submit');
                const errorBox = document.getElementById('login-error');

                if (!form) return;

                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    errorBox.classList.add('hidden');
                    errorBox.textContent = '';

                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value.trim();

                    if (!email || !password) {
                        errorBox.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                        errorBox.classList.remove('hidden');
                        return;
                    }

                    submitBtn.disabled = true;
                    const originalText = submitBtn.innerHTML;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...';

                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ emailOrPhone: email, password: password })
                        });

                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            errorBox.textContent = err.error || 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.';
                            errorBox.classList.remove('hidden');
                        } else {
                            const data = await res.json();
                            const token = data.accessToken;
                            if (token) {
                                document.cookie = "accessToken=" + token + ";path=/;max-age=86400;";
                            }
                            window.location.href = "/";
                        }
                    } catch (err) {
                        errorBox.textContent = 'Có lỗi xảy ra kết nối đến hệ thống.';
                        errorBox.classList.remove('hidden');
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                    }
                });
            })();
        </script>
    </div>
</body>
</html>
