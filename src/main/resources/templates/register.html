<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="#{register.title}">Đăng ký tài khoản - DSA Platform</title>
</head>
<body>
    <div th:fragment="content" class="min-h-[calc(100vh-64px-300px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
            <div>
                <div class="mx-auto h-12 w-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary text-2xl mb-6">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2 class="text-center text-3xl font-extrabold text-gray-900" th:text="#{register.title}">Bắt đầu hành trình</h2>
                <p class="mt-2 text-center text-sm text-gray-600" th:text="#{register.subtitle}">
                    Tạo tài khoản mới để bắt đầu học tập ngay hôm nay
                </p>
            </div>
            
            <form id="register-form" class="mt-8 space-y-4">
                <div id="register-error" class="hidden p-4 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100"></div>
                <div id="register-success" class="hidden p-4 rounded-lg bg-green-50 text-green-700 text-sm border border-green-100"></div>
                
                <div class="space-y-4">
                    <div class="form-group">
                        <label for="fullName" class="label-field" th:text="#{register.fullName}">Họ và tên</label>
                        <input id="fullName" name="fullName" type="text" required class="input-field" th:placeholder="#{register.fullNamePlaceholder}">
                    </div>
                    
                    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                        <div class="form-group">
                            <label for="email" class="label-field" th:text="#{register.email}">Email</label>
                            <input id="email" name="email" type="email" required class="input-field" th:placeholder="#{register.emailPlaceholder}">
                        </div>
                        <div class="form-group">
                            <label for="phone" class="label-field" th:text="#{register.phone}">Số điện thoại</label>
                            <input id="phone" name="phone" type="tel" required class="input-field" th:placeholder="#{register.phonePlaceholder}">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="label-field" th:text="#{register.password}">Mật khẩu</label>
                        <input id="password" name="password" type="password" required class="input-field" th:placeholder="#{register.passwordPlaceholder}">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword" class="label-field" th:text="#{register.confirmPassword}">Xác nhận mật khẩu</label>
                        <input id="confirmPassword" name="confirmPassword" type="password" required class="input-field" th:placeholder="#{register.confirmPasswordPlaceholder}">
                    </div>
                </div>

                <div class="flex items-start mt-4">
                    <div class="flex items-center h-5">
                        <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="terms" class="text-gray-600">Tôi đồng ý với <a href="#" class="text-primary font-semibold hover:underline">Điều khoản dịch vụ</a> và <a href="#" class="text-primary font-semibold hover:underline">Chính sách bảo mật</a>.</label>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="register-submit" class="btn btn-primary w-full py-3 shadow-lg shadow-primary/20">
                        <span th:text="#{register.signup}">Đăng ký tài khoản</span>
                        <i class="fas fa-user-check ml-2 text-xs"></i>
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    <span th:text="#{register.haveAccount}">Đã có tài khoản?</span>
                    <a href="/login" class="font-bold text-primary hover:text-primary-dark transition-colors" th:text="#{register.login}">Đăng nhập tại đây</a>
                </p>
            </div>
        </div>

        <script>
            (function() {
                const form = document.getElementById('register-form');
                const submitBtn = document.getElementById('register-submit');
                const errorBox = document.getElementById('register-error');
                const successBox = document.getElementById('register-success');

                if (!form) return;

                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    errorBox.classList.add('hidden');
                    successBox.classList.add('hidden');
                    errorBox.textContent = '';
                    successBox.textContent = '';

                    const fullName = document.getElementById('fullName').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const phone = document.getElementById('phone').value.trim();
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (!fullName || !email || !phone || !password || !confirmPassword) {
                        errorBox.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                        errorBox.classList.remove('hidden');
                        return;
                    }

                    if (password !== confirmPassword) {
                        errorBox.textContent = 'Mật khẩu xác nhận không khớp.';
                        errorBox.classList.remove('hidden');
                        return;
                    }

                    if (password.length < 6) {
                        errorBox.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                        errorBox.classList.remove('hidden');
                        return;
                    }

                    submitBtn.disabled = true;
                    const originalText = submitBtn.innerHTML;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang xử lý...';

                    try {
                        const res = await fetch('/api/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ fullName, email, phone, password })
                        });

                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            errorBox.textContent = err.message || err.error || 'Đăng ký thất bại. Vui lòng kiểm tra lại thông tin.';
                            errorBox.classList.remove('hidden');
                        } else {
                            successBox.textContent = 'Đăng ký thành công! Đang chuyển tới trang đăng nhập...';
                            successBox.classList.remove('hidden');
                            setTimeout(() => { window.location.href = '/login'; }, 1500);
                        }
                    } catch (err) {
                        errorBox.textContent = 'Có lỗi xảy ra kết nối đến hệ thống.';
                        errorBox.classList.remove('hidden');
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                    }
                });
            })();
        </script>
    </div>
</body>
</html>
