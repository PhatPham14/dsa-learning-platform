<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Khóa học của tôi - DSA Platform</title>
</head>
<body>
    <div th:fragment="content">
        <!-- Page Header -->
        <div class="bg-white border-b border-gray-200 mb-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary text-xl">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900" th:text="#{nav.myCourses}">Khóa học đã đăng ký</h1>
                        <p class="text-sm text-gray-500 mt-1">Tiếp tục hành trình chinh phục kiến thức của bạn.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
            <!-- Messages -->
            <div th:if="${message}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-100 text-green-700 flex items-center gap-3 animate-in fade-in slide-in-from-top-4">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}">Thông báo</span>
            </div>

            <!-- Empty State -->
            <div th:if="${enrollments == null || enrollments.isEmpty()}" class="text-center py-24 bg-white rounded-3xl border-2 border-dashed border-gray-200">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300 text-3xl">
                    <i class="fas fa-book-open"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">Bạn chưa sở hữu khóa học nào</h3>
                <p class="text-gray-500">Hãy khám phá các khóa học chất lượng để bắt đầu nâng cao kỹ năng.</p>
                <a href="/courses" class="btn btn-primary mt-8">
                    <i class="fas fa-search mr-2"></i> Khám phá khóa học ngay
                </a>
            </div>

            <!-- Courses Grid -->
            <div th:if="${enrollments != null && !enrollments.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <div th:each="enrollment : ${enrollments}" class="card group flex flex-col hover:shadow-xl transition-all duration-300 border-none ring-1 ring-gray-200 overflow-hidden">
                    <!-- Course Image -->
                    <div class="relative h-44 overflow-hidden bg-gray-100">
                        <img th:src="${enrollment.course.displayImageUrl != null ? enrollment.course.displayImageUrl : '/images/default-course.svg'}" alt="Course Image" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-4">
                            <span class="text-white text-xs font-bold bg-primary/80 px-2 py-0.5 rounded backdrop-blur-sm" th:text="${enrollment.progress + '% hoàn thành'}">15% hoàn thành</span>
                        </div>
                    </div>

                    <!-- Course Content -->
                    <div class="p-5 flex-grow flex flex-col">
                        <h3 th:text="${enrollment.course.title}" class="text-base font-bold text-gray-900 mb-2 line-clamp-2 group-hover:text-primary transition-colors min-h-[2.5rem]">Tiêu đề khóa học</h3>
                        <p th:text="${enrollment.course.description}" class="text-xs text-gray-500 mb-6 line-clamp-2 flex-grow">Mô tả khóa học...</p>
                        
                        <div class="pt-4 border-t border-gray-100 flex flex-col gap-4">
                            <!-- Progress Bar -->
                            <div class="w-full">
                                <div class="bg-gray-100 rounded-full h-1.5 w-full">
                                    <div class="bg-primary h-1.5 rounded-full transition-all duration-500" th:style="'width: ' + ${enrollment.progress} + '%'"></div>
                                </div>
                            </div>

                            <!-- Action Button -->
                            <a th:href="@{'/learn?courseId=' + ${enrollment.course.courseId}}" class="btn btn-primary w-full py-2.5 shadow-lg shadow-primary/10">
                                <i class="fas fa-play-circle mr-2"></i> Tiếp tục học
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
