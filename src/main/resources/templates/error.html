<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi - DSA Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full text-center">
        <div class="mb-8">
            <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500 text-4xl">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Rất tiếc! Đã có lỗi xảy ra.</h1>
            <p class="text-gray-500" th:if="${error != null}" th:text="${error}">Chi tiết lỗi</p>
            <p class="text-gray-500" th:if="${message != null}" th:text="${message}">Thông báo lỗi</p>
            <p class="text-gray-500" th:if="${error == null && message == null}">Hệ thống đang gặp sự cố tạm thời, vui lòng thử lại sau.</p>
        </div>
        
        <div class="space-y-4">
            <a href="/" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-lg shadow-blue-200">
                Quay về trang chủ
            </a>
            <button onclick="window.history.back()" class="block w-full bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3 px-6 rounded-xl border border-gray-200 transition-colors">
                Quay lại trang trước
            </button>
        </div>
        
        <p class="mt-12 text-gray-400 text-xs uppercase tracking-widest font-bold">
            &copy; 2026 DSA Learning Platform
        </p>
    </div>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
