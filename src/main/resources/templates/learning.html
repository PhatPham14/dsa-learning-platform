<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title th:text="${course.title + ' - Learning'}">Học tập - DSA Platform</title>
</head>
<body>
    <div th:fragment="content" class="bg-gray-100 min-h-screen">
        <div class="max-w-[1600px] mx-auto flex flex-col lg:flex-row h-full">
            
            <!-- Sidebar: Course Navigation -->
            <aside class="lg:w-96 bg-white border-r border-gray-200 lg:h-[calc(100vh-64px)] lg:sticky lg:top-16 overflow-y-auto z-10">
                <div class="p-6 border-b border-gray-100">
                    <h2 class="text-xl font-bold text-gray-900 line-clamp-2" th:text="${course.title}">Tiêu đề khóa học</h2>
                    <div class="mt-4 bg-gray-100 rounded-full h-2 w-full">
                        <div class="bg-primary h-2 rounded-full w-[15%]"></div>
                    </div>
                    <p class="mt-2 text-xs text-gray-500 font-medium uppercase tracking-wider">Tiến độ: 15% hoàn thành</p>
                </div>

                <div class="divide-y divide-gray-100">
                    <!-- Session Loop -->
                    <div th:each="courseSession, sStat : ${course.sessions}" class="session-group">
                        <button class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition-colors text-left group active-session" 
                                onclick="toggleSession(this)">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-xs font-bold" th:text="${sStat.count}">1</div>
                                <span class="text-sm font-bold text-gray-900 line-clamp-1" th:text="${courseSession.title}">Tên chương</span>
                            </div>
                            <i class="fas fa-chevron-down text-xs text-gray-400 transition-transform duration-300 group-[.active-session]:rotate-180"></i>
                        </button>

                        <div class="bg-gray-50 overflow-hidden transition-all duration-300 max-h-0 session-content">
                            <!-- Session Items -->
                            <div class="py-2">
                                <!-- Videos -->
                                <div th:each="video : ${courseSession.videos}" class="flex items-center gap-3 px-6 py-3 hover:bg-white cursor-pointer transition-colors border-l-4 border-transparent hover:border-primary group">
                                    <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center text-xs">
                                        <i class="fas fa-play"></i>
                                    </div>
                                    <div class="flex-grow min-w-0">
                                        <p class="text-xs font-semibold text-gray-900 line-clamp-1" th:text="${video.title}">Video Title</p>
                                        <p class="text-[10px] text-gray-400" th:text="${(video.duration != null ? video.duration : 0) + 's'}">5:00</p>
                                    </div>
                                    <i class="fas fa-check-circle text-gray-200 group-hover:text-primary transition-colors"></i>
                                </div>

                                <!-- Quizzes -->
                                <div th:each="quiz : ${courseSession.quizzes}" class="flex items-center gap-3 px-6 py-3 hover:bg-white cursor-pointer transition-colors border-l-4 border-transparent hover:border-primary group opacity-60">
                                    <div class="w-8 h-8 rounded-lg bg-purple-100 text-purple-600 flex items-center justify-center text-xs">
                                        <i class="fas fa-question"></i>
                                    </div>
                                    <div class="flex-grow min-w-0">
                                        <p class="text-xs font-semibold text-gray-900 line-clamp-1" th:text="${quiz.title}">Quiz Title</p>
                                        <p class="text-[10px] text-gray-400">Trắc nghiệm</p>
                                    </div>
                                    <span class="text-[10px] font-bold text-gray-400 italic">Soon</span>
                                </div>

                                <!-- Assignments -->
                                <a th:each="assignment : ${courseSession.assignments}" 
                                   th:href="@{/submit(courseId=${course.courseId})}"
                                   class="flex items-center gap-3 px-6 py-3 hover:bg-white cursor-pointer transition-colors border-l-4 border-transparent hover:border-primary group">
                                    <div class="w-8 h-8 rounded-lg bg-green-100 text-green-600 flex items-center justify-center text-xs">
                                        <i class="fas fa-code"></i>
                                    </div>
                                    <div class="flex-grow min-w-0">
                                        <p class="text-xs font-semibold text-gray-900 line-clamp-1" th:text="${assignment.title}">Assignment Title</p>
                                        <p class="text-[10px] text-gray-400">Bài tập thực hành</p>
                                    </div>
                                    <i class="fas fa-lock-open text-gray-200 group-hover:text-primary transition-colors"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content: Video/Reading/Quiz Area -->
            <main class="flex-grow p-6 lg:p-12 overflow-y-auto">
                <!-- Video Player Placeholder -->
                <div class="aspect-video bg-black rounded-2xl shadow-2xl overflow-hidden relative group mb-8">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="text-center text-white">
                            <i class="fas fa-play-circle text-8xl opacity-50 group-hover:opacity-100 transition-opacity cursor-pointer"></i>
                            <p class="mt-4 text-xl font-bold">Chọn một bài học để bắt đầu</p>
                        </div>
                    </div>
                </div>

                <!-- Content Info -->
                <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-200">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-gray-900">Nội dung bài học</h2>
                        <div class="flex items-center gap-2">
                            <button class="btn btn-outline btn-sm"><i class="fas fa-chevron-left"></i> Bài trước</button>
                            <button class="btn btn-primary btn-sm">Bài tiếp theo <i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    
                    <div class="prose prose-blue max-w-none text-gray-600 leading-relaxed">
                        <p th:text="${course.description}">Mô tả khóa học sẽ xuất hiện ở đây khi bạn bắt đầu một bài học cụ thể.</p>
                        <hr class="my-8 border-gray-100">
                        <div class="flex items-center gap-8">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-calendar-alt text-gray-400"></i>
                                <span class="text-sm">Cập nhật: 06/03/2026</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <i class="fas fa-globe text-gray-400"></i>
                                <span class="text-sm">Ngôn ngữ: Tiếng Việt</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <script>
            function toggleSession(button) {
                const content = button.nextElementSibling;
                const isExpanded = button.classList.contains('active-session');
                
                // Close all sessions first (optional, for accordion effect)
                // document.querySelectorAll('.session-content').forEach(el => el.style.maxHeight = '0');
                // document.querySelectorAll('.session-group button').forEach(el => el.classList.remove('active-session'));

                if (isExpanded) {
                    button.classList.remove('active-session');
                    content.style.maxHeight = '0';
                } else {
                    button.classList.add('active-session');
                    content.style.maxHeight = content.scrollHeight + 'px';
                }
            }

            // Expand first session by default
            document.addEventListener('DOMContentLoaded', () => {
                const firstButton = document.querySelector('.session-group button');
                if (firstButton) toggleSession(firstButton);
            });
        </script>
        
        <style>
            .active-session {
                background-color: rgba(59, 130, 246, 0.05);
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        </style>
    </div>
</body>
</html>
